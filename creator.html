  <style>
    :root {
      --teal:      #003E51;
      --teal-dark: #002938;
      --teal-mid:  #005166;
      --teal-pale: #EEF5F7;
      --gold:      #C8A84B;
      --gold-dark: #A8882B;
      --white:     #FFFFFF;
      --off-white: #F8FAFB;
      --gray-200:  #E2E8EB;
      --gray-400:  #9BB0B8;
      --gray-600:  #5A7A85;
      --text:      #0D2B36;
      --radius:    10px;
      --t: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Heebo', sans-serif; background: var(--off-white); color: var(--text); }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 300;

      padding: 0 48px; gap: 32px;

    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-mark {
      width: 32px; height: 32px; background: var(--teal); border-radius: 7px;
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .nav-logo-mark::after {
      content: ''; position: absolute; bottom: -3px; right: -3px;
      width: 9px; height: 9px; background: var(--gold);
      border-radius: 50%; border: 2px solid var(--white);
    }
    .nav-brand { font-size: 0.95rem; font-weight: 900; color: var(--teal); line-height: 1; }
    .nav-brand span { color: var(--gold); }
    .nav-brand sub { display: block; font-size: 0.55rem; font-weight: 500; color: var(--gray-400); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; vertical-align: baseline; }
    .back-btn {
      margin-right: auto;
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--gray-600); text-decoration: none; font-size: 0.85rem; font-weight: 500;
      border: 1.5px solid var(--gray-200); padding: 7px 16px; border-radius: 6px;
      transition: border-color var(--t), color var(--t);
    }
    .back-btn:hover { border-color: var(--teal); color: var(--teal); }

    /* ── HERO / COVER ── */
    .profile-hero {
      background: var(--off-white);
      padding-bottom: 0;
    }
    .cover-outer {
      background: var(--teal);
      width: 100%;
    }
    .cover-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0 48px;
    }
    .cover-image {
      width: 100%;
      height: 280px;
      border-radius: 0 0 var(--radius) var(--radius);
      background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal-mid) 60%, #00697e 100%);
      overflow: hidden;
      position: relative;
    }
    .cover-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    /* subtle geometric decoration on cover */
    .cover-image::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(200,168,75,0.12) 0%, transparent 55%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.04) 0%, transparent 40%);
      pointer-events: none;
    }
    .cover-image::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, rgba(0,62,81,0.3));
      pointer-events: none;
    }

    /* Profile info row — below cover, white bg */
    .profile-info-wrap {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
    }
    .profile-info-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0 48px 28px;
      display: flex; align-items: flex-end;
      gap: 24px; flex-wrap: wrap;
    }
    .avatar-lg {
      width: 96px; height: 96px; min-width: 96px;
      border-radius: 50%;
      border: 4px solid var(--white);
      background: var(--teal-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; overflow: hidden;
      margin-top: -48px;
      box-shadow: 0 4px 20px rgba(0,62,81,0.18);
      position: relative; z-index: 1;
    }
    .avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
    .profile-text { flex: 1; min-width: 200px; padding-top: 16px; }
    .profile-spec {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--teal-pale); border: 1px solid rgba(0,62,81,0.15);
      border-radius: 4px; padding: 3px 10px;
      font-size: 0.7rem; font-weight: 700; color: var(--teal);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .profile-name { font-size: 1.8rem; font-weight: 900; color: var(--teal); letter-spacing: -0.02em; line-height: 1.1; }
    .profile-handle { font-size: 0.82rem; color: var(--gray-400); margin-top: 2px; }
    .profile-actions {
      display: flex; gap: 10px; align-self: flex-end;
      padding-top: 16px; flex-wrap: wrap;
    }
    .btn-gold {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--gold); color: var(--teal);
      font-family: 'Heebo', sans-serif; font-size: 0.92rem; font-weight: 700;
      padding: 11px 24px; border-radius: 6px; border: none;
      cursor: pointer; text-decoration: none;
      transition: background var(--t), transform var(--t);
    }
    .btn-gold:hover { background: var(--gold-dark); transform: translateY(-1px); }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 7px;
      background: transparent; color: var(--teal);
      font-family: 'Heebo', sans-serif; font-size: 0.88rem; font-weight: 500;
      padding: 10px 20px; border-radius: 6px;
      border: 1.5px solid var(--gray-200); cursor: pointer;
      text-decoration: none; transition: border-color var(--t), background var(--t);
    }
    .btn-outline:hover { border-color: var(--teal); background: var(--teal-pale); }

    /* ── MAIN CONTENT ── */
    .main-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 32px 48px 0;
    }

    /* Bio */
    .bio-box {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 24px;
    }
    .bio-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
    }
    .bio-text { font-size: 0.93rem; color: var(--gray-600); line-height: 1.8; }

    /* Videos */
    .videos-section { padding-bottom: 48px; }
    .section-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 20px;
      flex-wrap: wrap; gap: 10px;
    }
    .section-title {
      font-size: 1.25rem; font-weight: 900;
      color: var(--teal); padding-bottom: 10px;
      position: relative; display: inline-block;
    }
    .section-title::after {
      content: ''; position: absolute; bottom: 0; right: 0;
      width: 36px; height: 3px; background: var(--gold);
    }
    .sort-select {
      background: var(--white); border: 1.5px solid var(--gray-200);
      color: var(--gray-600); font-family: 'Heebo', sans-serif;
      font-size: 0.8rem; padding: 7px 12px; border-radius: 6px; cursor: pointer;
    }
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 18px;
    }
    .video-card {
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color var(--t);
      cursor: pointer;
    }
    .video-card:hover { border-color: var(--teal); }
    .video-thumb {
      aspect-ratio: 16/9;
      background: var(--teal-pale);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-info { padding: 12px 14px; }
    .video-title { font-size: 0.86rem; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
    .video-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.72rem; color: var(--gray-400); }
    .video-tag {
      background: var(--teal-pale); border-radius: 3px; padding: 2px 8px;
      font-size: 0.68rem; font-weight: 600; color: var(--teal);
    }

    /* ── BOOKING FOOTER ── */
    .booking-footer {
      background: var(--teal);
      margin-top: 0;
      padding: 52px 48px;
    }
    .booking-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 32px; flex-wrap: wrap;
      position: relative; z-index: 1;
    }
    .booking-text {}
    .booking-eyebrow {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .booking-eyebrow-line { width: 24px; height: 1px; background: var(--gold); }
    .booking-eyebrow-txt {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--gold);
    }
    .booking-title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 900; color: var(--white);
      line-height: 1.15; letter-spacing: -0.02em;
    }
    .booking-title span { color: var(--gold); }
    .booking-sub {
      margin-top: 8px;
      font-size: 0.88rem; color: rgba(255,255,255,0.6); line-height: 1.6;

    .btn-booking-gold {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--gold); color: var(--teal);
      font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 700;
      padding: 14px 32px; border-radius: 6px; border: none;
      cursor: pointer; text-decoration: none;
      transition: background var(--t), transform var(--t), box-shadow var(--t);
    }
    .btn-booking-gold:hover { background: var(--gold-dark); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(200,168,75,0.35); }
    .btn-booking-gold:hover svg { transform: translateX(-3px); }
    .btn-booking-gold svg { transition: transform var(--t); }
    .btn-booking-outline {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: rgba(255,255,255,0.8);
      font-family: 'Heebo', sans-serif; font-size: 0.88rem; font-weight: 500;
      padding: 13px 22px; border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.3); cursor: pointer;
      text-decoration: none; transition: border-color var(--t), background var(--t);
    }
    .btn-booking-outline:hover { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.07); }

    /* site footer */
    footer {
      background: var(--teal-dark); padding: 20px 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-brand { font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.4); }
    .footer-brand span { color: var(--gold); }
    .footer-legal { font-size: 0.72rem; color: rgba(255,255,255,0.25); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .cover-inner { padding: 0 20px; }
      .cover-image { height: 180px; }
      .profile-info-inner { padding: 0 20px 24px; gap: 16px; }
      .avatar-lg { width: 78px; height: 78px; min-width: 78px; margin-top: -38px; font-size: 1.8rem; }
      .main-inner { padding: 24px 20px 0; }
      .profile-actions { width: 100%; }
      .btn-gold, .btn-outline { flex: 1; justify-content: center; }
      .booking-footer { padding: 40px 20px; }
      .booking-inner { flex-direction: column; align-items: flex-start; }
      footer { padding: 18px 20px; flex-direction: column; gap: 4px; text-align: center; }
    }
  </style>
</head>
