<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Creature — פרופיל יוצר</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #001820;
      --surface:  #00263a;
      --teal:     #003E51;
      --accent:   #00c8a0;
      --accent2:  #00a8cc;
      --text:     #e8f8f5;
      --muted:    #6ab5c4;
      --border:   rgba(0,168,204,0.15);
      --radius:   12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; }

    /* Nav */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(0,24,32,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 60px; height: 68px;
    }
    .logo {
      font-size: 1.25rem; font-weight: 900;
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text);
    }
    .logo-icon {
      width: 32px; height: 32px; background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      box-shadow: 0 0 16px rgba(0,200,160,0.5);
    }
    .logo span { color: var(--accent); }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); text-decoration: none; font-size: 0.88rem;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--accent); }

    /* Profile header */
    .profile-header {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 60px 60px 0;
    }
    .profile-top {
      display: flex; align-items: flex-start; gap: 36px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .avatar-lg {
      width: 110px; height: 110px; min-width: 110px;
      border-radius: 50%;
      background: var(--teal);
      border: 3px solid rgba(0,200,160,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem;
      box-shadow: 0 0 28px rgba(0,200,160,0.2);
    }
    .profile-meta { flex: 1; min-width: 200px; }
    .profile-spec {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,200,160,0.08); border: 1px solid rgba(0,200,160,0.2);
      border-radius: 100px; padding: 4px 14px;
      font-size: 0.78rem; color: var(--accent); margin-bottom: 10px;
    }
    .profile-name {
      font-size: 2.2rem; font-weight: 900;
      letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .profile-handle { font-size: 0.9rem; color: var(--muted); margin-bottom: 14px; }
    .profile-bio {
      font-size: 0.95rem; color: var(--muted);
      line-height: 1.75; max-width: 520px;
    }
    .profile-actions {
      display: flex; flex-direction: column; gap: 12px;
      align-self: center; min-width: 180px;
    }
    .btn-hire {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 28px;
      background: var(--accent); color: #001820;
      font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer; text-decoration: none;
      transition: box-shadow 0.3s, transform 0.2s;
      box-shadow: 0 0 20px rgba(0,200,160,0.35);
    }
    .btn-hire:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(0,200,160,0.55); }
    .btn-contact {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 28px;
      background: transparent; color: var(--accent);
      font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 500;
      border: 1px solid rgba(0,200,160,0.35); border-radius: 8px;
      cursor: pointer; text-decoration: none; transition: background 0.2s, border-color 0.2s;
    }
    .btn-contact:hover { background: rgba(0,200,160,0.08); border-color: var(--accent); }

    /* Stats row */
    .stats-row {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 0 60px;
      display: flex; gap: 0;
    }
    .stat-box {
      flex: 1; padding: 28px 0;
      border-left: 1px solid var(--border);
      text-align: center;
    }
    .stat-box:last-child { border-right: 1px solid var(--border); }
    .stat-num { font-size: 1.9rem; font-weight: 900; color: var(--accent); line-height: 1; }
    .stat-lbl { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    /* Videos section */
    .section-wrap {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 56px 60px 100px;
    }
    .section-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
    }
    .section-title {
      font-size: 1.5rem; font-weight: 900; letter-spacing: -0.02em;
    }
    .sort-select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-family: 'Heebo', sans-serif;
      font-size: 0.85rem; padding: 8px 16px; border-radius: 6px; cursor: pointer;
    }

    /* Videos grid */
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .video-card {
      background: rgba(0,38,58,0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .video-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0,200,160,0.35);
      box-shadow: 0 12px 36px rgba(0,0,0,0.35);
    }
    .video-thumb {
      aspect-ratio: 16/9;
      background: var(--teal);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s;
    }
    .video-card:hover .video-overlay { opacity: 1; }
    .play-btn {
      width: 52px; height: 52px;
      background: rgba(0,200,160,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 24px rgba(0,200,160,0.6);
    }
    .video-duration {
      position: absolute; bottom: 8px; left: 10px;
      background: rgba(0,0,0,0.7);
      color: #fff; font-size: 0.72rem; font-weight: 500;
      padding: 2px 8px; border-radius: 4px;
    }
    .video-info { padding: 14px 16px; }
    .video-title {
      font-size: 0.9rem; font-weight: 700;
      margin-bottom: 6px; line-height: 1.4;
    }
    .video-meta {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: var(--muted);
    }
    .video-tag {
      display: inline-block;
      background: rgba(0,200,160,0.08);
      border: 1px solid rgba(0,200,160,0.15);
      border-radius: 100px; padding: 2px 10px;
      font-size: 0.72rem; color: var(--accent);
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .profile-header { padding: 40px 20px 0; }
      .profile-top { gap: 20px; }
      .stats-row { padding: 0 20px; }
      .section-wrap { padding: 40px 20px 60px; }
      .profile-actions { flex-direction: row; flex-wrap: wrap; width: 100%; }
      .btn-hire, .btn-contact { flex: 1; text-align: center; justify-content: center; }
    }
  </style>
</head>
<body>

// ── Load page ──────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const creator = creators[id];

if (!creator) {

    <div style="text-align:center;padding:120px 20px;color:var(--muted)">
      <div style="font-size:3rem;margin-bottom:20px">🤔</div>
      <h2 style="margin-bottom:12px">יוצר לא נמצא</h2>
      <a href="index.html" style="color:var(--accent)">חזרה לרשימה</a>

  document.getElementById('page-content').innerHTML = `

      </div>
      <div class="stat-box">
        <div class="stat-num">⭐ ${creator.stats.rating}</div>
        <div class="stat-lbl">דירוג</div>
      </div>
      <div class="stat-box">

        <div class="stat-lbl">צפיות</div>
      </div>

    <div class="section-wrap">
      <div class="section-top">
        <div class="section-title">העבודות שלי</div>
        <select class="sort-select">
          <option>הכי פופולרי</option>
          <option>הכי חדש</option>
        </select>
      </div>
      <div class="videos-grid">
        ${creator.videos.map(v => `
          <div class="video-card">
            <div class="video-thumb" style="background:var(--teal)">${v.thumb}
              <div class="video-overlay">

              </div>

            </div>

// ── Particles ──────────────────────────────────────────────────────
const pc = document.getElementById('particles');
const px = pc.getContext('2d');
let PW, PH, pts;
function resizePc() { PW = pc.width = window.innerWidth; PH = pc.height = window.innerHeight; }
resizePc(); window.addEventListener('resize', resizePc);
function mkPt() {
  return { x: Math.random()*PW, y: Math.random()*PH,
           r: Math.random()*1.4+0.2, vx:(Math.random()-0.5)*0.2, vy:-Math.random()*0.35-0.08,
           a: Math.random()*0.35+0.08 };
}
pts = Array.from({length:70}, mkPt);
(function drawPc() {
  px.clearRect(0,0,PW,PH);
  for (const p of pts) {
    px.beginPath(); px.arc(p.x,p.y,p.r,0,Math.PI*2);
    px.fillStyle=`rgba(0,200,160,${p.a})`; px.fill();
    p.x+=p.vx; p.y+=p.vy;
    if(p.y<-5||p.x<-5||p.x>PW+5) Object.assign(p,mkPt(),{y:PH+5});
  }
  requestAnimationFrame(drawPc);
})();
</script>
</body>
</html>
