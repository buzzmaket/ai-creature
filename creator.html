<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Creature — פרופיל יוצר</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:      #003E51;
      --teal-mid:  #005166;
      --teal-light:#e8f4f7;
      --gold:      #c8a84b;
      --gold-light:#f5e6b8;
      --white:     #ffffff;
      --gray-bg:   #f4f6f7;
      --gray-line: #dde6ea;
      --text:      #1a2e36;
      --muted:     #5a7a85;
      --radius:    10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: var(--gray-bg); color: var(--text); }

    /* Nav */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: var(--white);
      border-bottom: 2px solid var(--teal);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 60px; height: 70px;
      box-shadow: 0 2px 12px rgba(0,62,81,0.08);
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .logo-text { font-size: 1.3rem; font-weight: 900; color: var(--teal); }
    .logo-text span { color: var(--gold); }
    .logo-badge {
      background: var(--teal); color: var(--white);
      font-size: 0.65rem; font-weight: 700;
      padding: 3px 8px; border-radius: 4px; letter-spacing: 0.05em;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--teal); text-decoration: none;
      font-size: 0.88rem; font-weight: 500;
      border: 1.5px solid var(--gray-line);
      padding: 8px 18px; border-radius: 6px;
      transition: border-color 0.2s, background 0.2s;
    }
    .back-btn:hover { border-color: var(--teal); background: var(--teal-light); }

    /* Profile hero */
    .profile-hero {
      background: var(--teal);
      padding: 50px 60px 0; position: relative; overflow: hidden;
    }
    .profile-hero::before {
      content: '';
      position: absolute; left: -60px; top: -60px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      pointer-events: none;
    }
    .profile-top {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: flex-end;
      gap: 30px; flex-wrap: wrap;
      padding-bottom: 40px;
      position: relative; z-index: 1;
    }
    .avatar-lg {
      width: 100px; height: 100px; min-width: 100px;
      border-radius: 50%;
      background: var(--teal-mid);
      border: 3px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem; overflow: hidden;
    }
    .avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info { flex: 1; min-width: 200px; }
    .profile-spec {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(200,168,75,0.2);
      border: 1px solid rgba(200,168,75,0.5);
      border-radius: 4px; padding: 4px 12px;
      font-size: 0.72rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .profile-name {
      font-size: 2rem; font-weight: 900;
      color: var(--white); letter-spacing: -0.02em;
    }
    .profile-handle { font-size: 0.88rem; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .profile-actions {
      display: flex; gap: 12px; align-self: center; flex-wrap: wrap;
    }
    .btn-gold {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--gold); color: var(--teal);
      font-family: 'Heebo', sans-serif; font-size: 0.92rem; font-weight: 700;
      padding: 12px 26px; border-radius: 6px; border: none;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-gold:hover { background: #b8942f; transform: translateY(-2px); }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--white);
      font-family: 'Heebo', sans-serif; font-size: 0.88rem; font-weight: 500;
      padding: 11px 22px; border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.35); cursor: pointer;
      text-decoration: none; transition: border-color 0.2s, background 0.2s;
    }
    .btn-outline:hover { border-color: var(--white); background: rgba(255,255,255,0.08); }

    /* Stats */
    .stats-bar {
      background: var(--white);
      border-bottom: 1px solid var(--gray-line);
    }
    .stats-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex;
    }
    .stat-box {
      flex: 1; padding: 24px 20px;
      text-align: center;
      border-left: 1px solid var(--gray-line);
    }
    .stat-box:last-child { border-right: 1px solid var(--gray-line); }
    .stat-num { font-size: 1.8rem; font-weight: 900; color: var(--teal); line-height: 1; }
    .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    /* Bio section */
    .bio-section {
      max-width: 1100px; margin: 0 auto;
      padding: 36px 60px 0;
    }
    .bio-box {
      background: var(--white);
      border: 1.5px solid var(--gray-line);
      border-radius: var(--radius);
      padding: 28px 32px;
    }
    .bio-title {
      font-size: 0.75rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .bio-text {
      font-size: 0.95rem; color: var(--muted);
      line-height: 1.8;
    }

    /* Videos */
    .videos-section {
      max-width: 1100px; margin: 0 auto;
      padding: 36px 60px 80px;
    }
    .section-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 28px;
      flex-wrap: wrap; gap: 12px;
    }
    .section-title {
      font-size: 1.4rem; font-weight: 900;
      color: var(--teal); letter-spacing: -0.02em;
    }
    .section-title::after {
      content: ''; display: block;
      width: 40px; height: 3px;
      background: var(--gold); margin-top: 5px;
    }
    .sort-select {
      background: var(--white); border: 1.5px solid var(--gray-line);
      color: var(--muted); font-family: 'Heebo', sans-serif;
      font-size: 0.82rem; padding: 8px 14px; border-radius: 6px; cursor: pointer;
    }
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .video-card {
      background: var(--white);
      border: 1.5px solid var(--gray-line);
      border-radius: var(--radius); overflow: hidden;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .video-card:hover {
      transform: translateY(-5px);
      border-color: var(--teal);
      box-shadow: 0 10px 30px rgba(0,62,81,0.12);
    }
    .video-thumb {
      aspect-ratio: 16/9;
      background: var(--teal-light);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-overlay {
      position: absolute; inset: 0;
      background: rgba(0,62,81,0.45);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s;
    }
    .video-card:hover .video-overlay { opacity: 1; }
    .play-btn {
      width: 50px; height: 50px;
      background: var(--gold); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .video-duration {
      position: absolute; bottom: 8px; left: 10px;
      background: rgba(0,0,0,0.65);
      color: #fff; font-size: 0.7rem; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
    }
    .video-info { padding: 14px 16px; }
    .video-title {
      font-size: 0.88rem; font-weight: 700;
      color: var(--text); margin-bottom: 8px; line-height: 1.4;
    }
    .video-meta {
      display: flex; justify-content: space-between;
      align-items: center; font-size: 0.73rem; color: var(--muted);
    }
    .video-tag {
      background: var(--teal-light);
      border: 1px solid rgba(0,62,81,0.12);
      border-radius: 4px; padding: 2px 9px;
      font-size: 0.7rem; font-weight: 700; color: var(--teal);
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .profile-hero { padding: 40px 20px 0; }
      .bio-section { padding: 24px 20px 0; }
      .videos-section { padding: 24px 20px 60px; }
      .profile-actions { width: 100%; }
      .btn-gold, .btn-outline { flex: 1; justify-content: center; text-align: center; }
      .stats-inner { flex-wrap: wrap; }
      .stat-box { min-width: 50%; border: none; border-bottom: 1px solid var(--gray-line); }
    }
  </style>
</head>
<body>

<nav>
